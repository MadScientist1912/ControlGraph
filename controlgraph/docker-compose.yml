services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: controlgraph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      APP_NAME: ControlGraph
      APP_ENV: dev
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/controlgraph
      EVIDENCE_DIR: /app/evidence
      CORS_ORIGINS: '*'
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
